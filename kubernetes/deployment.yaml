apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone-app
  template:
    metadata:
      labels:
        app: capstone-app
    spec:
      containers:
      - name: capstone-app
        image: 515917620428.dkr.ecr.us-east-2.amazonaws.com/capstone-app:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
